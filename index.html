<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>iamnotai — 한글 AI 티 제거기</title>
<style>
:root {
  --bg:#0f0f13; --surface:#1a1a22; --surface2:#22222e; --border:#2d2d3a;
  --text:#e8e8f0; --dim:#888898; --accent:#6e7bff; --accent2:#a78bfa;
  --ok:#4ade80; --warn:#fb923c; --danger:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;font-size:15px;min-height:100%;}

header{padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
header h1{font-size:1.2rem;font-weight:800;letter-spacing:-.03em;}
header h1 span{color:var(--accent2);}
.v-badge{background:var(--accent);color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;}
.sub{color:var(--dim);font-size:12px;margin-left:auto;}

.container{max-width:900px;margin:0 auto;padding:16px;}

/* 탭 */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;}
.tab{padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* 입력 탭 */
#tabInput{}
textarea{width:100%;min-height:160px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;line-height:1.8;font-family:inherit;resize:vertical;outline:none;}
textarea:focus{border-color:var(--accent);}
.toolbar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.btn{padding:9px 18px;border-radius:8px;font-size:14px;font-weight:600;border:1px solid var(--border);cursor:pointer;background:var(--surface2);color:var(--text);transition:all .15s;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.96);}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.fix{background:#166534;color:var(--ok);border-color:var(--ok);}
.char-cnt{font-size:12px;color:var(--dim);align-self:center;margin-left:auto;}

/* 점수 카드 */
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;}
.score-ring{position:relative;width:72px;height:72px;flex-shrink:0;}
.score-ring svg{transform:rotate(-90deg);}
.ring-track{fill:none;stroke:var(--surface2);stroke-width:7;}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:7;stroke-linecap:round;stroke-dasharray:188;stroke-dashoffset:188;transition:stroke-dashoffset .5s ease,stroke .3s;}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.4rem;font-weight:800;}
.score-info h2{font-size:1.5rem;font-weight:800;}
.score-info p{color:var(--dim);font-size:13px;margin-top:4px;}
.score-info .verdict{font-size:14px;margin-top:6px;}

/* 통계 그리드 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.stat .val{font-size:1.2rem;font-weight:700;color:var(--accent);}
.stat .lbl{font-size:11px;color:var(--dim);margin-top:2px;}

/* 하이라이트 결과 뷰 */
.result-text{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:15px;line-height:1.9;white-space:pre-wrap;word-break:break-word;margin-bottom:12px;}
.result-text mark{border-radius:3px;padding:1px 2px;cursor:pointer;}
.result-text mark:hover{filter:brightness(1.3);}

/* 패턴 색상 */
.hA{background:#e74c3c30;border-bottom:2px solid #e74c3c;color:inherit;}
.hB{background:#e67e2230;border-bottom:2px solid #e67e22;color:inherit;}
.hC{background:#f39c1230;border-bottom:2px solid #f39c12;color:inherit;}
.hD{background:#27ae6030;border-bottom:2px solid #27ae60;color:inherit;}
.hE{background:#2980b930;border-bottom:2px solid #2980b9;color:inherit;}
.hF{background:#8e44ad30;border-bottom:2px solid #8e44ad;color:inherit;}
.hG{background:#16a08530;border-bottom:2px solid #16a085;color:inherit;}
.hH{background:#c0392b30;border-bottom:2px solid #c0392b;color:inherit;}
.hI{background:#95a5a630;border-bottom:2px solid #95a5a6;color:inherit;}
.hJ{background:#1abc9c30;border-bottom:2px solid #1abc9c;color:inherit;}
.hK{background:#d3540030;border-bottom:2px solid #d35400;color:inherit;}
.hL{background:#34495e30;border-bottom:2px solid #34495e;color:inherit;}

/* 패턴 리스트 */
.match-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.match-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;border-left-width:3px;}
.match-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.sev-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;}
.match-name{font-size:13px;font-weight:700;}
.match-found{font-size:13px;background:var(--surface2);padding:3px 8px;border-radius:5px;font-family:monospace;margin:4px 0;display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.match-alt{font-size:13px;color:var(--ok);}

/* 범례 */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--dim);}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* 수정본 뷰 */
.fixed-view{background:#0a1f12;border:1px solid #166534;border-radius:10px;padding:16px;font-size:15px;line-height:1.9;white-space:pre-wrap;word-break:break-word;margin-bottom:12px;}
.fixed-view ins{background:#14532d;color:var(--ok);text-decoration:none;border-radius:3px;padding:0 2px;}
.fixed-view del{background:#450a0a;color:var(--danger);text-decoration:line-through;opacity:.7;border-radius:3px;padding:0 2px;}

/* 빈 상태 */
.empty{text-align:center;padding:40px;color:var(--dim);}
.empty .ico{font-size:2.5rem;margin-bottom:12px;}

/* 숨김 */
.hidden{display:none!important;}
</style>
</head>
<body>

<header>
  <h1>i<span>am</span>notai</h1>
  <span class="v-badge">v2.0</span>
  <span class="sub">12카테고리 · 55+ 패턴</span>
</header>

<div class="container">

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab active" id="tabBtnInput">✍️ 입력</div>
    <div class="tab" id="tabBtnResult">🔍 결과</div>
    <div class="tab" id="tabBtnFixed">✏️ 수정본</div>
  </div>

  <!-- 입력 탭 -->
  <div id="panelInput">
    <textarea id="inputText" placeholder="AI가 생성한 한국어 텍스트를 붙여넣으세요.

예: '결론적으로 시사하는 바가 크다', '~를 통해', '되어진다' 등의 패턴을 자동으로 탐지합니다."></textarea>
    <div class="toolbar">
      <button class="btn primary" id="btnAnalyze">🔍 분석</button>
      <button class="btn fix" id="btnFix">✏️ 자동수정</button>
      <button class="btn" id="btnSample">샘플</button>
      <button class="btn" id="btnClear">지우기</button>
      <span class="char-cnt" id="charCnt">0자</span>
    </div>
  </div>

  <!-- 결과 탭 -->
  <div id="panelResult" class="hidden">
    <!-- 점수 -->
    <div class="score-card">
      <div class="score-ring">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="ring-track" cx="36" cy="36" r="30"/>
          <circle class="ring-fill" id="ringFill" cx="36" cy="36" r="30"/>
        </svg>
        <div class="score-num" id="scoreNum">0</div>
      </div>
      <div class="score-info">
        <h2 id="scoreTitle">분석 전</h2>
        <p>AI 티 점수 (0 = 자연스러움 / 100 = AI 냄새 강함)</p>
        <div class="verdict" id="scoreVerdict"></div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="stats">
      <div class="stat"><div class="val" id="stTotal">0</div><div class="lbl">감지 패턴</div></div>
      <div class="stat"><div class="val" id="stHigh" style="color:var(--danger)">0</div><div class="lbl">심각도 높음</div></div>
      <div class="stat"><div class="val" id="stCats">0</div><div class="lbl">카테고리</div></div>
      <div class="stat"><div class="val" id="stChars">0</div><div class="lbl">글자수</div></div>
    </div>

    <!-- 하이라이트 텍스트 -->
    <div id="highlightText" class="result-text"></div>

    <!-- 범례 -->
    <div class="legend" id="legend"></div>

    <!-- 패턴 목록 -->
    <div class="match-list" id="matchList">
      <div class="empty"><div class="ico">✅</div>감지된 패턴이 없습니다</div>
    </div>
  </div>

  <!-- 수정본 탭 -->
  <div id="panelFixed" class="hidden">
    <div id="fixedText" class="fixed-view"></div>
    <div class="toolbar">
      <button class="btn primary" id="btnCopyFixed">📋 복사</button>
    </div>
  </div>

</div>

<script>
// ── 카테고리 & 패턴 ──────────────────────────────
const CATS = [
  {id:"A",name:"번역투",color:"#e74c3c",pats:[
    {id:"A01",name:"~를 통해",    rx:/(?:을|를)\s*통해(?:서)?/g,sev:2,alt:["~으로","~이/가 ~해서"]},
    {id:"A02",name:"~에 있어서",  rx:/에\s*있어서?/g,sev:3,alt:["~에서","~(에서는)"]},
    {id:"A03",name:"~의 경우",    rx:/의\s*경우(?:에는?)?/g,sev:2,alt:["이럴 때","~은/는"]},
    {id:"A04",name:"~에 대한/해", rx:/에\s*대(?:한|해(?:서)?)/g,sev:1,alt:["~의","~을/를"]},
    {id:"A05",name:"~함으로써",   rx:/(?:함|하게\s*됨)으로써/g,sev:2,alt:["~해서","~하면"]},
    {id:"A06",name:"~의 측면에서",rx:/의\s*측면에서/g,sev:2,alt:["~적으로 보면"]},
    {id:"A07",name:"~로 인해/인한",rx:/로\s*인해|로\s*인한/g,sev:1,alt:["~때문에","~ 탓에"]},
    {id:"A08",name:"~의 중요성",  rx:/의\s*중요성(?:이|을|은)?/g,sev:2,alt:["얼마나 중요한지"]},
    {id:"A09",name:"~와/과 함께", rx:/(?:와|과)\s*함께/g,sev:2,alt:["~면서","~할수록"]},
    {id:"A10",name:"~를 위한/해", rx:/(?:을|를)\s*위한|(?:을|를)\s*위해(?:서)?/g,sev:1,alt:["~려고","~하려"]},
  ]},
  {id:"B",name:"피동 남용",color:"#e67e22",pats:[
    {id:"B01",name:"이중 피동 되어진다",rx:/되어\s*진다|되어지고|되어지며|되어지는/g,sev:3,alt:["된다","됩니다"]},
    {id:"B02",name:"~로 여겨진다",     rx:/(?:로|으로)\s*여겨진다|여겨지고|여겨지며/g,sev:2,alt:["~다","~로 보인다"]},
    {id:"B03",name:"~된다고 할 수 있다",rx:/된다고\s*(?:할|볼)\s*수\s*있다/g,sev:3,alt:["된다","될 수 있다"]},
    {id:"B04",name:"하게 됩니다",      rx:/하게\s*됩니다|하게\s*되었습니다/g,sev:2,alt:["합니다","했습니다"]},
    {id:"B05",name:"~로 판단된다",     rx:/(?:로|으로)\s*판단된다/g,sev:2,alt:["~다","~으로 보인다"]},
  ]},
  {id:"C",name:"관용구·클리셰",color:"#f39c12",pats:[
    {id:"C01",name:"시사하는 바가 크다",rx:/시사하는\s*바가\s*(?:크다|있다|많다)/g,sev:3,alt:["보여준다","의미가 있다"]},
    {id:"C02",name:"결론적으로",       rx:/결론적으로/g,sev:2,alt:["결국","한마디로"]},
    {id:"C03",name:"주목할 만하다",    rx:/주목할\s*만하다|주목할\s*만한/g,sev:2,alt:["눈에 띈다","인상적이다"]},
    {id:"C04",name:"간과할 수 없다",   rx:/간과할\s*수\s*없다/g,sev:2,alt:["놓쳐선 안 된다"]},
    {id:"C05",name:"새로운 패러다임",  rx:/새로운\s*패러다임/g,sev:3,alt:["새로운 방향","판이 달라졌다"]},
    {id:"C06",name:"심도 있는 논의",   rx:/심도\s*(?:있는|깊은)\s*논의/g,sev:2,alt:["깊이 따져봐야"]},
    {id:"C07",name:"지속적 노력 필요", rx:/지속적인\s*노력이\s*필요하다/g,sev:2,alt:["계속 노력해야 한다"]},
    {id:"C08",name:"핵심 역량",        rx:/핵심\s*역량/g,sev:2,alt:["가장 중요한 능력"]},
    {id:"C09",name:"시너지 효과",      rx:/시너지\s*효과/g,sev:2,alt:["합치면 더 큰 효과"]},
    {id:"C10",name:"미래 지향적",      rx:/미래\s*지향적/g,sev:2,alt:["앞을 내다보면"]},
  ]},
  {id:"D",name:"기계적 병렬",color:"#27ae60",pats:[
    {id:"D02",name:"또한…그리고/더불어",rx:/또한.{0,60}(?:그리고|더불어|아울러)/g,sev:2,alt:["연결 없이 직접 서술"]},
    {id:"D03",name:"뿐만 아니라",      rx:/뿐만\s*아니라/g,sev:2,alt:["이고","이기도 하다"]},
  ]},
  {id:"E",name:"접속사 남발",color:"#2980b9",pats:[
    {id:"E01",name:"따라서",          rx:/따라서/g,sev:1,alt:["그러니","(생략)"]},
    {id:"E02",name:"이에 따라",       rx:/이에\s*따라/g,sev:2,alt:["그래서","이 때문에"]},
    {id:"E03",name:"그러므로",        rx:/그러므로/g,sev:1,alt:["그래서","결국"]},
    {id:"E04",name:"이러한 맥락에서", rx:/이러한\s*맥락에서/g,sev:3,alt:["이런 점에서","이를 감안하면"]},
    {id:"E05",name:"종합적으로 보면", rx:/종합(?:적으로|해\s*보면)/g,sev:2,alt:["전반적으로","결국"]},
  ]},
  {id:"F",name:"리듬 균일",color:"#8e44ad",pats:[
    {id:"F02",name:"~습니다 3회 연속",rx:/습니다[.。][^가-힣]{0,5}[가-힣].{3,30}습니다[.。][^가-힣]{0,5}[가-힣].{3,30}습니다/g,sev:2,alt:["다양한 어미로 변화주기"]},
  ]},
  {id:"H",name:"영어 혼용",color:"#c0392b",pats:[
    {id:"H01",name:"한글 내 영어 삽입",rx:/[가-힣]\s+[A-Za-z]{4,}\s+[가-힣]/g,sev:2,alt:["한국어로 번역"]},
    {id:"H02",name:"영어 어미 한국어화",rx:/(?:하는|된|할)\s+[A-Za-z]+(?:ing|tion|ment|ness)(?:을|를|이|가)/g,sev:3,alt:["순수 한국어로"]},
  ]},
  {id:"I",name:"과도한 단정",color:"#95a5a6",pats:[
    {id:"I01",name:"임이 분명하다",   rx:/임이\s*분명하다|임이\s*틀림없다/g,sev:2,alt:["일 것이다","가능성이 높다"]},
    {id:"I02",name:"에 틀림없다",     rx:/에\s*틀림없다|임에\s*틀림없다/g,sev:2,alt:["일 것이다"]},
    {id:"I03",name:"누구나 알다시피", rx:/누구나\s*알(?:다시피|듯이)|주지하다시피/g,sev:2,alt:["이미 알려진"]},
  ]},
  {id:"J",name:"격식체 과잉",color:"#1abc9c",pats:[
    {id:"J01",name:"~하겠습니다 반복",rx:/(?:하겠습니다|드리겠습니다)[.。]/g,sev:2,alt:["합니다","한다"]},
    {id:"J02",name:"말씀드리자면",    rx:/(?:에\s*대해|에\s*관해)\s*(?:말씀드리|설명드리)(?:자면|겠습니다)/g,sev:3,alt:["~은/는","~을 보면"]},
    {id:"J03",name:"살펴보도록 하겠습니다",rx:/살펴보도록\s*하겠습니다|알아보도록\s*하겠습니다/g,sev:3,alt:["살펴보겠습니다"]},
  ]},
  {id:"K",name:"빈 부사",color:"#d35400",pats:[
    {id:"K01",name:"매우/상당히",rx:/매우\s+|상당히\s+|굉장히\s+|대단히\s+/g,sev:1,alt:["수치·근거로 대체"]},
    {id:"K02",name:"다양한 (막연)",rx:/다양한\s+(?!분야|관점|시각)/g,sev:2,alt:["구체적으로 어떤 것인지"]},
    {id:"K03",name:"더욱더/한층 더",rx:/더욱더\s+|한층\s*더\s+/g,sev:1,alt:["더"]},
  ]},
  {id:"L",name:"AI 구조 신호",color:"#5b6eae",pats:[
    {id:"L01",name:"마크다운 제목",rx:/^#{1,3}\s+.+$/gm,sev:2,alt:["일반 문단으로"]},
    {id:"L02",name:"불릿 포인트 과용",rx:/^[-•*]\s+.{5,}$/gm,sev:2,alt:["산문으로 풀어쓰기"]},
  ]},
];

const CAT_MAP = {};
for(const c of CATS){ CAT_MAP[c.id]=c; }

// ── 분석 ──────────────────────────────────────────
function analyze(text){
  const res=[];
  for(const cat of CATS){
    for(const p of cat.pats){
      try{
        const rx=new RegExp(p.rx.source, p.rx.flags.includes('m')?'gm':'g');
        let m;
        while((m=rx.exec(text))!==null){
          res.push({id:p.id,catId:cat.id,catName:cat.name,catColor:cat.color,
            name:p.name,start:m.index,end:m.index+m[0].length,
            text:m[0],sev:p.sev,alt:p.alt});
        }
      }catch(e){}
    }
  }
  // 리듬 균일 통계 분석
  try{
    const sents=text.split(/[.。!?！？]\s*/);
    const lens=sents.map(s=>s.trim().length).filter(l=>l>5);
    if(lens.length>=4){
      const mean=lens.reduce((a,b)=>a+b,0)/lens.length;
      const vari=lens.reduce((a,l)=>a+(l-mean)**2,0)/lens.length;
      if(vari<100&&mean>15){
        res.push({id:"F01",catId:"F",catName:"리듬 균일",catColor:"#8e44ad",
          name:"문장 길이 균일 (리듬 단조로움)",
          start:0,end:text.length,
          text:`문장 ${lens.length}개 / 평균 ${mean.toFixed(0)}자`,
          sev:2,alt:["짧고 긴 문장을 섞어 리듬 변화를"]});
      }
    }
  }catch(e){}
  // 중복 제거
  res.sort((a,b)=>a.start-b.start||(b.sev-a.sev));
  const out=[]; let last=-1;
  for(const r of res){ if(r.start>=last){out.push(r);last=r.end;} }
  return out;
}

function calcScore(text,matches){
  if(!text.trim()) return 0;
  const w=matches.reduce((s,m)=>s+m.sev,0);
  return Math.min(100,Math.round(w/Math.max(text.length,1)*1000*8));
}

// ── 자동수정 ──────────────────────────────────────
const FIXES=[
  [/(?:을|를)\s*통해(?:서)?/g,"으로"],
  [/에\s*있어서?/g,"에서"],
  [/함으로써/g,"해서"],
  [/로\s*인해/g,"때문에"],
  [/와\s*함께/g,"와"],
  [/되어\s*진다/g,"된다"],[/되어지고/g,"되고"],[/되어지며/g,"되며"],
  [/하게\s*됩니다/g,"합니다"],[/하게\s*되었습니다/g,"했습니다"],[/하게\s*된다/g,"한다"],
  [/살펴보도록\s*하겠습니다/g,"살펴보겠습니다"],
  [/이러한\s*맥락에서/g,"이런 점에서"],
  [/종합적으로\s*보면/g,"전반적으로"],
  [/결론적으로/g,"결국"],
  [/이에\s*따라/g,"그래서"],
  [/시사하는\s*바가\s*크다/g,"많은 것을 보여준다"],
  [/새로운\s*패러다임/g,"새로운 방향"],
  [/주목할\s*만하다/g,"눈에 띈다"],
  [/더욱더\s+/g,"더 "],[/한층\s*더\s+/g,"더 "],
];
function autoFix(text){
  let out=text,cnt=0;
  for(const [p,r] of FIXES){const t=out.replace(p,r);if(t!==out)cnt++;out=t;}
  return{text:out,cnt};
}

// ── 렌더링 ────────────────────────────────────────
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderHL(text,matches){
  if(!matches.length) return `<span style="color:var(--ok)">✅ 패턴이 감지되지 않았습니다.</span>\n\n`+esc(text);
  let html="",pos=0;
  for(const m of matches){
    if(m.catId==="F01"&&m.start===0&&m.end===text.length) continue;
    if(m.start>pos) html+=esc(text.slice(pos,m.start));
    html+=`<mark class="h${m.catId}" title="${esc(m.name)}: ${esc((m.alt[0]||''))}">${esc(text.slice(m.start,m.end))}</mark>`;
    pos=m.end;
  }
  if(pos<text.length) html+=esc(text.slice(pos));
  return html;
}

function renderDiff(orig,fixed){
  const ow=orig.split(/(\s+)/),fw=fixed.split(/(\s+)/);
  let h="";
  for(let i=0;i<Math.max(ow.length,fw.length);i++){
    const o=ow[i]??"",f=fw[i]??"";
    if(o===f){h+=esc(o);}
    else{if(o)h+=`<del>${esc(o)}</del>`;if(f)h+=`<ins>${esc(f)}</ins>`;}
  }
  return h;
}

// ── UI 상태 ───────────────────────────────────────
let currentFixed="";

function showTab(id){
  ["panelInput","panelResult","panelFixed"].forEach(p=>document.getElementById(p).classList.add("hidden"));
  ["tabBtnInput","tabBtnResult","tabBtnFixed"].forEach(t=>document.getElementById(t).classList.remove("active"));
  document.getElementById("panel"+id).classList.remove("hidden");
  document.getElementById("tabBtn"+id).classList.add("active");
}

document.getElementById("tabBtnInput").onclick=()=>showTab("Input");
document.getElementById("tabBtnResult").onclick=()=>showTab("Result");
document.getElementById("tabBtnFixed").onclick=()=>showTab("Fixed");

// 글자수
document.getElementById("inputText").addEventListener("input",function(){
  document.getElementById("charCnt").textContent=this.value.length+"자";
});

// 분석
document.getElementById("btnAnalyze").addEventListener("click",function(){
  const text=document.getElementById("inputText").value.trim();
  if(!text){alert("텍스트를 입력해주세요.");return;}
  const matches=analyze(text);
  const score=calcScore(text,matches);

  // 점수 업데이트
  document.getElementById("scoreNum").textContent=score;
  const offset=188*(1-score/100);
  document.getElementById("ringFill").style.strokeDashoffset=offset;
  let scoreColor,title,verdict;
  if(score>=70){scoreColor="#f87171";title=score+"/100";verdict="🔴 AI 냄새가 강합니다";}
  else if(score>=40){scoreColor="#fb923c";title=score+"/100";verdict="🟠 일부 AI 표현이 보입니다";}
  else if(score>=15){scoreColor="#fcd34d";title=score+"/100";verdict="🟡 자연스럽지만 개선 가능";}
  else{scoreColor="#4ade80";title=score+"/100";verdict="🟢 자연스러운 한국어에 가깝습니다";}
  document.getElementById("ringFill").style.stroke=scoreColor;
  document.getElementById("scoreNum").style.color=scoreColor;
  document.getElementById("scoreTitle").textContent=title;
  document.getElementById("scoreVerdict").textContent=verdict;
  document.getElementById("scoreVerdict").style.color=scoreColor;

  // 통계
  document.getElementById("stTotal").textContent=matches.length;
  document.getElementById("stHigh").textContent=matches.filter(m=>m.sev===3).length;
  document.getElementById("stCats").textContent=new Set(matches.map(m=>m.catId)).size;
  document.getElementById("stChars").textContent=text.length+"자";

  // 하이라이트
  document.getElementById("highlightText").innerHTML=renderHL(text,matches);

  // 범례
  const usedCats=[...new Set(matches.map(m=>m.catId))];
  document.getElementById("legend").innerHTML=usedCats.map(id=>`<div class="leg"><div class="leg-dot" style="background:${CAT_MAP[id]?.color}"></div>${CAT_MAP[id]?.name||id}</div>`).join("");

  // 패턴 목록
  const ml=document.getElementById("matchList");
  if(!matches.length){
    ml.innerHTML='<div class="empty"><div class="ico">✅</div>AI 특유 패턴이 없습니다!</div>';
  } else {
    const SEV=["","낮음","중간","높음"];
    const SEVC=["","#fcd34d","#fb923c","#f87171"];
    const SEVBG=["","#3b2f00","#3b1f00","#3b0f0f"];
    ml.innerHTML=matches.map(m=>`
      <div class="match-item" style="border-left-color:${m.catColor}">
        <div class="match-head">
          <span class="sev-badge" style="background:${SEVBG[m.sev]};color:${SEVC[m.sev]}">${SEV[m.sev]}</span>
          <span style="font-size:11px;color:${m.catColor};font-weight:700">${m.catName}</span>
          <span class="match-name">${esc(m.name)}</span>
        </div>
        <div class="match-found">"${esc(m.text.slice(0,50))}${m.text.length>50?'…':''}"</div>
        ${m.alt.length?`<div class="match-alt">→ ${esc(m.alt.slice(0,2).join(' / '))}</div>`:''}
      </div>`).join("");
  }

  showTab("Result");
});

// 자동수정
document.getElementById("btnFix").addEventListener("click",function(){
  const text=document.getElementById("inputText").value.trim();
  if(!text){alert("텍스트를 입력해주세요.");return;}
  const{text:fixed,cnt}=autoFix(text);
  currentFixed=fixed;
  document.getElementById("fixedText").innerHTML=
    renderDiff(text,fixed)+
    `\n\n<span style="color:var(--dim);font-size:12px">— ${cnt}개 규칙 적용됨</span>`;
  showTab("Fixed");
});

// 복사
document.getElementById("btnCopyFixed").addEventListener("click",function(){
  navigator.clipboard.writeText(currentFixed).then(()=>{
    this.textContent="✅ 복사됨";setTimeout(()=>this.textContent="📋 복사",1500);
  }).catch(()=>{
    const ta=document.createElement("textarea");
    ta.value=currentFixed;document.body.appendChild(ta);ta.select();
    document.execCommand("copy");document.body.removeChild(ta);
    this.textContent="✅ 복사됨";setTimeout(()=>this.textContent="📋 복사",1500);
  });
});

// 샘플
const SAMPLE=`결론적으로, 인공지능 기술의 발전을 통해 우리 사회에 있어서 다양한 변화가 이루어지고 있습니다. 이러한 맥락에서 교육 분야에 있어서 특히 주목할 만한 성과가 도출되어진다고 할 수 있습니다.

따라서 우리는 지속적인 노력이 필요하다는 사실을 간과할 수 없으며, 새로운 패러다임을 통해 미래 지향적인 방향으로 나아가야 합니다. 이에 따라 시너지 효과를 극대화함으로써 핵심 역량을 강화해야 할 것입니다.

이 문제에 대해 말씀드리자면, 여러 측면에서 심도 있는 논의가 필요하다고 여겨집니다. 종합적으로 보면 이번 연구는 시사하는 바가 크며, 향후 더욱더 활발한 연구가 기대됩니다.`;

document.getElementById("btnSample").addEventListener("click",function(){
  const ta=document.getElementById("inputText");
  ta.value=SAMPLE;
  document.getElementById("charCnt").textContent=SAMPLE.length+"자";
});

document.getElementById("btnClear").addEventListener("click",function(){
  document.getElementById("inputText").value="";
  document.getElementById("charCnt").textContent="0자";
  showTab("Input");
});

// 키보드 단축키
document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){e.preventDefault();document.getElementById("btnAnalyze").click();}
});
</script>
