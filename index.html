<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iamnotai — 한글 AI 티 제거기</title>
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface2: #22222e;
  --border: #2d2d3a;
  --text: #e8e8f0;
  --text-dim: #888898;
  --accent: #6e7bff;
  --accent2: #a78bfa;
  --success: #4ade80;
  --warn: #fb923c;
  --danger: #f87171;

  --cat-a: #e74c3c; --cat-b: #e67e22; --cat-c: #f39c12;
  --cat-d: #27ae60; --cat-e: #2980b9; --cat-f: #8e44ad;
  --cat-g: #16a085; --cat-h: #c0392b; --cat-i: #7f8c8d;
  --cat-j: #1abc9c; --cat-k: #d35400; --cat-l: #2c3e50;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; font-size: 15px; }

/* ── 헤더 ── */
header {
  padding: 18px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
}
header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
header h1 span { color: var(--accent2); }
header .badge { background: var(--accent); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
header .sub { color: var(--text-dim); font-size: 13px; margin-left: auto; }

/* ── 메인 레이아웃 ── */
main {
  display: grid;
  grid-template-columns: 1fr 340px;
  height: calc(100vh - 58px);
  overflow: hidden;
}

/* ── 좌측 편집기 영역 ── */
.editor-panel {
  display: flex; flex-direction: column;
  padding: 20px;
  gap: 12px;
  overflow: hidden;
}
.toolbar {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.btn {
  padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
  border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
  background: var(--surface2); color: var(--text);
}
.btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn.success { background: #166534; color: var(--success); border-color: var(--success); }
.char-count { margin-left: auto; font-size: 12px; color: var(--text-dim); }

/* 탭 */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.tab {
  padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  border-bottom: 2px solid transparent; color: var(--text-dim); transition: all 0.15s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }

/* 입력 텍스트에어리어 */
.text-wrap {
  flex: 1; position: relative; overflow: hidden;
  border: 1px solid var(--border); border-radius: 10px;
  background: var(--surface);
}
#inputText {
  width: 100%; height: 100%; padding: 16px;
  background: transparent; color: var(--text);
  font-size: 15px; line-height: 1.8; font-family: inherit;
  border: none; outline: none; resize: none;
  position: absolute; top: 0; left: 0;
  z-index: 2; caret-color: var(--accent);
}
/* 하이라이트 오버레이 */
#highlightOverlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  padding: 16px;
  font-size: 15px; line-height: 1.8; font-family: inherit;
  pointer-events: none;
  white-space: pre-wrap; word-break: break-word;
  z-index: 1; color: transparent;
  overflow: hidden;
}
#inputText { background: transparent; color: var(--text); mix-blend-mode: normal; }

/* 수정 결과 뷰 */
#fixedView {
  display: none; flex: 1;
  border: 1px solid #166534; border-radius: 10px;
  background: #0a1f12; padding: 16px;
  font-size: 15px; line-height: 1.8;
  overflow-y: auto; white-space: pre-wrap; word-break: break-word;
  color: var(--text);
}
#fixedView ins { background: #14532d; color: var(--success); text-decoration: none; border-radius: 3px; padding: 0 2px; }
#fixedView del { background: #450a0a; color: var(--danger); text-decoration: line-through; border-radius: 3px; padding: 0 2px; opacity: 0.7; }

/* ── 우측 패널 ── */
.result-panel {
  border-left: 1px solid var(--border);
  overflow-y: auto;
  display: flex; flex-direction: column;
}

/* 점수 섹션 */
.score-section {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.score-ring {
  width: 90px; height: 90px; margin: 0 auto 12px;
  position: relative;
}
.score-ring svg { transform: rotate(-90deg); }
.score-ring .track { fill: none; stroke: var(--surface2); stroke-width: 8; }
.score-ring .fill  { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
.score-num {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.6rem; font-weight: 700;
}
.score-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
.score-desc { font-size: 13px; margin-top: 8px; }

/* 통계 바 */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; padding: 12px 20px;
  border-bottom: 1px solid var(--border);
}
.stat-card {
  background: var(--surface2); border-radius: 8px; padding: 10px 12px;
  font-size: 12px;
}
.stat-card .val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
.stat-card .lbl { color: var(--text-dim); margin-top: 2px; }

/* 패턴 목록 */
.matches-section { flex: 1; padding: 12px 16px; }
.matches-section h3 { font-size: 12px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.08em; margin-bottom: 10px; }
.match-item {
  padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
  border-left: 3px solid var(--border);
  background: var(--surface2); cursor: pointer; transition: all 0.15s;
}
.match-item:hover { background: var(--surface); }
.match-item .m-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.match-item .m-badge { font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 700; }
.match-item .m-name { font-size: 13px; font-weight: 600; }
.match-item .m-text { font-size: 12px; color: var(--text-dim); font-family: 'Courier New', monospace; background: var(--surface); padding: 2px 6px; border-radius: 4px; margin: 3px 0; }
.match-item .m-alt  { font-size: 12px; color: var(--success); }

/* 심각도 배지 */
.sev-1 { background: #3b2f0060; color: #fcd34d; border-left-color: #fcd34d; }
.sev-2 { background: #3b1f0060; color: #fb923c; border-left-color: #fb923c; }
.sev-3 { background: #3b0f0f60; color: #f87171; border-left-color: #f87171; }
.badge-1 { background: #3b2f00; color: #fcd34d; }
.badge-2 { background: #3b1f00; color: #fb923c; }
.badge-3 { background: #3b0f0f; color: #f87171; }

/* 빈 상태 */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; }
.empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

/* 하이라이트 마크 */
mark.hl {
  border-radius: 3px; padding: 1px 0;
  cursor: pointer; transition: filter 0.15s;
}
mark.hl:hover { filter: brightness(1.3); }
mark.cat-A { background: #e74c3c40; border-bottom: 2px solid #e74c3c; color: inherit; }
mark.cat-B { background: #e67e2240; border-bottom: 2px solid #e67e22; color: inherit; }
mark.cat-C { background: #f39c1240; border-bottom: 2px solid #f39c12; color: inherit; }
mark.cat-D { background: #27ae6040; border-bottom: 2px solid #27ae60; color: inherit; }
mark.cat-E { background: #2980b940; border-bottom: 2px solid #2980b9; color: inherit; }
mark.cat-F { background: #8e44ad40; border-bottom: 2px solid #8e44ad; color: inherit; }
mark.cat-G { background: #16a08540; border-bottom: 2px solid #16a085; color: inherit; }
mark.cat-H { background: #c0392b40; border-bottom: 2px solid #c0392b; color: inherit; }
mark.cat-I { background: #7f8c8d40; border-bottom: 2px solid #7f8c8d; color: inherit; }
mark.cat-J { background: #1abc9c40; border-bottom: 2px solid #1abc9c; color: inherit; }
mark.cat-K { background: #d3540040; border-bottom: 2px solid #d35400; color: inherit; }
mark.cat-L { background: #2c3e5040; border-bottom: 2px solid #2c3e50; color: inherit; }

/* 범례 */
.legend { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* 반응형 */
@media (max-width: 768px) {
  main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
  .result-panel { max-height: 40vh; border-left: none; border-top: 1px solid var(--border); }
}
</style>
</head>
<body>

<header>
  <h1>i<span>am</span>notai</h1>
  <span class="badge">v2.0</span>
  <span style="font-size:13px;color:var(--text-dim)">한글 AI 티 제거기</span>
  <span class="sub">12카테고리 · 55+ 패턴</span>
</header>

<main>
  <!-- 좌측 편집기 -->
  <div class="editor-panel">
    <div class="toolbar">
      <button class="btn primary" id="btnAnalyze">🔍 분석</button>
      <button class="btn" id="btnFix">✏️ 자동 수정</button>
      <button class="btn" id="btnClear">지우기</button>
      <button class="btn" id="btnCopy">복사</button>
      <button class="btn" id="btnSample">샘플 텍스트</button>
      <span class="char-count" id="charCount">0자</span>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="input">원문</div>
      <div class="tab" data-tab="fixed">수정본</div>
    </div>
    <div class="text-wrap" id="editorWrap">
      <div id="highlightOverlay"></div>
      <textarea id="inputText" placeholder="AI가 생성한 한국어 텍스트를 여기에 붙여넣으세요.

번역투, 피동 남용, AI 특유의 관용구 등을 자동으로 탐지하고 하이라이트합니다.

예: '결론적으로 시사하는 바가 크다', '~를 통해', '되어진다' 등"></textarea>
    </div>
    <div id="fixedView"></div>
  </div>

  <!-- 우측 결과 패널 -->
  <div class="result-panel">
    <div class="score-section">
      <div class="score-ring">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle class="track" cx="45" cy="45" r="37"/>
          <circle class="fill" id="scoreArc" cx="45" cy="45" r="37"
            stroke-dasharray="232.5" stroke-dashoffset="232.5" stroke="#6e7bff"/>
        </svg>
        <div class="score-num" id="scoreNum">—</div>
      </div>
      <div class="score-label">AI 티 점수 (0 = 자연스러움)</div>
      <div class="score-desc" id="scoreDesc" style="color:var(--text-dim)">텍스트를 입력하고 분석을 눌러주세요</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="val" id="statTotal">—</div>
        <div class="lbl">감지된 패턴</div>
      </div>
      <div class="stat-card">
        <div class="val" id="statHigh" style="color:var(--danger)">—</div>
        <div class="lbl">심각도 높음</div>
      </div>
      <div class="stat-card">
        <div class="val" id="statCats">—</div>
        <div class="lbl">관련 카테고리</div>
      </div>
      <div class="stat-card">
        <div class="val" id="statChars">—</div>
        <div class="lbl">텍스트 길이</div>
      </div>
    </div>

    <div class="matches-section">
      <h3>감지된 패턴</h3>
      <div id="matchList">
        <div class="empty-state">
          <div class="icon">🔬</div>
          분석 전입니다
        </div>
      </div>
    </div>

    <div class="legend" id="legend"></div>
  </div>
</main>

<script>
// ──────────────────────────────────────────────────────
//  패턴 DB (내장)
// ──────────────────────────────────────────────────────
const CATEGORIES = [
  { id:"A", name:"번역투", color:"#e74c3c", patterns:[
    { id:"A01", name:"~를 통해",     regex:/(?:을|를)\s*통해(?:서)?/g, sev:2, alt:["~으로","~이/가 (~해서)"] },
    { id:"A02", name:"~에 있어서",   regex:/에\s*있어서?/g,            sev:3, alt:["~에서","~(에서는)"] },
    { id:"A03", name:"~의 경우",     regex:/의\s*경우(?:에는?)?/g,     sev:2, alt:["이럴 때","~은/는"] },
    { id:"A04", name:"~에 대한/해",  regex:/에\s*대(?:한|해(?:서)?)/g, sev:1, alt:["~의","~을/를"] },
    { id:"A05", name:"~함으로써",    regex:/(?:함|하게\s*됨)으로써/g,  sev:2, alt:["~해서","~하면"] },
    { id:"A06", name:"~의 측면에서", regex:/의\s*측면에서/g,           sev:2, alt:["~적으로 보면"] },
    { id:"A07", name:"~로 인해",     regex:/로\s*인해|로\s*인한/g,     sev:1, alt:["~때문에","~ 탓에"] },
    { id:"A08", name:"~의 중요성",   regex:/의\s*중요성(?:이|을|은)?/g, sev:2, alt:["얼마나 중요한지"] },
    { id:"A09", name:"~와 함께",     regex:/(?:와|과)\s*함께/g,        sev:2, alt:["~면서","~할수록"] },
    { id:"A10", name:"~를 위한/해",  regex:/(?:을|를)\s*위한|(?:을|를)\s*위해(?:서)?/g, sev:1, alt:["~려고","~하려"] },
  ]},
  { id:"B", name:"피동 남용", color:"#e67e22", patterns:[
    { id:"B01", name:"이중 피동 되어진다", regex:/되어\s*진다|되어지고|되어지며|되어지는/g, sev:3, alt:["된다","~됩니다"] },
    { id:"B02", name:"~로 여겨진다",      regex:/(?:로|으로)\s*여겨진다|여겨지고|여겨지며/g, sev:2, alt:["~다","~로 보인다"] },
    { id:"B03", name:"~된다고 할 수 있다",regex:/된다고\s*(?:할|볼)\s*수\s*있다/g, sev:3, alt:["된다","될 수 있다"] },
    { id:"B04", name:"하게 됩니다",       regex:/하게\s*됩니다|하게\s*되었습니다/g, sev:2, alt:["합니다","했습니다"] },
    { id:"B05", name:"~로 판단된다",      regex:/(?:로|으로)\s*판단된다/g, sev:2, alt:["~다","~으로 보인다"] },
  ]},
  { id:"C", name:"관용구·클리셰", color:"#f39c12", patterns:[
    { id:"C01", name:"시사하는 바가 크다",    regex:/시사하는\s*바가\s*(?:크다|있다|많다)/g, sev:3, alt:["보여준다","의미가 있다"] },
    { id:"C02", name:"결론적으로",            regex:/결론적으로/g, sev:2, alt:["결국","한마디로"] },
    { id:"C03", name:"주목할 만하다",         regex:/주목할\s*만하다|주목할\s*만한/g, sev:2, alt:["눈에 띈다","인상적이다"] },
    { id:"C04", name:"간과할 수 없다",        regex:/간과할\s*수\s*없다/g, sev:2, alt:["놓쳐선 안 된다","중요하다"] },
    { id:"C05", name:"새로운 패러다임",       regex:/새로운\s*패러다임/g, sev:3, alt:["새로운 방향","판이 달라졌다"] },
    { id:"C06", name:"심도 있는 논의",        regex:/심도\s*(?:있는|깊은)\s*논의/g, sev:2, alt:["깊이 따져봐야","자세히 살펴봐야"] },
    { id:"C07", name:"지속적 노력이 필요",    regex:/지속적인\s*노력이\s*필요하다/g, sev:2, alt:["계속 노력해야 한다"] },
    { id:"C08", name:"핵심 역량",             regex:/핵심\s*역량/g, sev:2, alt:["가장 중요한 능력","꼭 필요한 실력"] },
    { id:"C09", name:"시너지 효과",           regex:/시너지\s*효과/g, sev:2, alt:["합치면 더 큰 효과"] },
    { id:"C10", name:"미래 지향적",           regex:/미래\s*지향적/g, sev:2, alt:["앞을 내다보면"] },
  ]},
  { id:"D", name:"기계적 병렬", color:"#27ae60", patterns:[
    { id:"D01", name:"첫째/둘째/셋째",        regex:/첫째[,，]?[\s\S]{0,200}?둘째[,，]?[\s\S]{0,200}?셋째/g, sev:2, alt:["산문으로 자연스럽게 연결"] },
    { id:"D02", name:"또한…그리고/더불어",    regex:/또한.{0,60}(?:그리고|더불어|아울러)/g, sev:2, alt:["연결 없이 직접 서술"] },
    { id:"D03", name:"뿐만 아니라",           regex:/뿐만\s*아니라/g, sev:2, alt:["이고","이기도 하다"] },
    { id:"D04", name:"한편/다른 한편",        regex:/한편으로는[\s\S]{0,80}다른\s*한편으로는/g, sev:2, alt:["양면이 있다","이자 ~이다"] },
  ]},
  { id:"E", name:"접속사 남발", color:"#2980b9", patterns:[
    { id:"E01", name:"따라서",             regex:/따라서/g,              sev:1, alt:["그러니","(생략)"] },
    { id:"E02", name:"이에 따라",          regex:/이에\s*따라/g,         sev:2, alt:["그래서","이 때문에"] },
    { id:"E03", name:"그러므로",           regex:/그러므로/g,            sev:1, alt:["그래서","결국"] },
    { id:"E04", name:"이러한 맥락에서",    regex:/이러한\s*맥락에서/g,   sev:3, alt:["이런 점에서","이를 감안하면"] },
    { id:"E05", name:"종합적으로 보면",    regex:/종합(?:적으로|해\s*보면|해\s*볼\s*때)/g, sev:2, alt:["전반적으로","결국"] },
  ]},
  { id:"F", name:"리듬 균일", color:"#8e44ad", patterns:[
    { id:"F02", name:"~습니다 연속",  regex:/습니다[.。]\s*[가-힣].{3,30}습니다[.。]\s*[가-힣].{3,30}습니다/g, sev:2, alt:["한다/해요 등을 섞어 변화주기"] },
  ]},
  { id:"G", name:"이모지 남용", color:"#16a085", patterns:[
    { id:"G01", name:"문장 시작 이모지", regex:/(?:^|\n)[^\S\n]*[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, sev:2, alt:["이모지 없이 내용으로 승부"] },
    { id:"G02", name:"연속 이모지",     regex:/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}]{2,}/gu, sev:3, alt:["이모지 1개 이하"] },
  ]},
  { id:"H", name:"영어 혼용", color:"#c0392b", patterns:[
    { id:"H01", name:"한글 내 영어 삽입", regex:/[가-힣]\s+[A-Za-z]{4,}\s+[가-힣]/g, sev:2, alt:["한국어로 번역"] },
    { id:"H02", name:"영어 어미 한국어화", regex:/(?:하는|된|할)\s+[A-Za-z]+(?:ing|tion|ment|ness)(?:을|를|이|가)/g, sev:3, alt:["순수 한국어로 표현"] },
  ]},
  { id:"I", name:"과도한 단정", color:"#7f8c8d", patterns:[
    { id:"I01", name:"임이 분명하다",  regex:/임이\s*분명하다|임이\s*틀림없다/g, sev:2, alt:["일 것이다","가능성이 높다"] },
    { id:"I02", name:"에 틀림없다",   regex:/에\s*틀림없다|임에\s*틀림없다/g,  sev:2, alt:["일 것이다"] },
    { id:"I03", name:"누구나 알다시피",regex:/누구나\s*알(?:다시피|듯이)|주지하다시피/g, sev:2, alt:["이미 알려진","(독자 가르치는 어투 피하기)"] },
  ]},
  { id:"J", name:"격식체 과잉", color:"#1abc9c", patterns:[
    { id:"J01", name:"~하겠습니다 반복", regex:/(?:하겠습니다|드리겠습니다)[.。]/g, sev:2, alt:["합니다","한다"] },
    { id:"J02", name:"말씀드리자면",    regex:/(?:에\s*대해|에\s*관해)\s*(?:말씀드리|설명드리)(?:자면|겠습니다)/g, sev:3, alt:["~은/는","~을 보면"] },
    { id:"J03", name:"살펴보도록 하겠습니다", regex:/살펴보도록\s*하겠습니다|알아보도록\s*하겠습니다/g, sev:3, alt:["살펴보겠습니다","들여다보면"] },
  ]},
  { id:"K", name:"빈 부사", color:"#d35400", patterns:[
    { id:"K01", name:"매우/상당히",  regex:/매우\s+|상당히\s+|굉장히\s+|대단히\s+/g, sev:1, alt:["구체적 수치·근거로 대체"] },
    { id:"K02", name:"다양한 (막연)",regex:/다양한\s+(?!분야|관점|시각|방면)/g, sev:2, alt:["어떤 종류인지 구체적으로"] },
    { id:"K03", name:"더욱더",       regex:/더욱더\s+|한층\s*더\s+/g, sev:1, alt:["더"] },
  ]},
  { id:"L", name:"AI 구조 신호", color:"#5b6eae", patterns:[
    { id:"L01", name:"마크다운 제목 (일반 글)", regex:/^#{1,3}\s+.+$/gm, sev:2, alt:["일반 문단으로"] },
    { id:"L02", name:"불릿 포인트 과용",        regex:/^[-•*]\s+.{5,}$/gm, sev:2, alt:["산문으로 풀어쓰기"] },
    { id:"L03", name:"물음표 소제목",           regex:/^[가-힣A-Za-z].{5,40}\?$/gm, sev:2, alt:["직접 서술로"] },
  ]},
];

// ──────────────────────────────────────────────────────
//  분석 엔진
// ──────────────────────────────────────────────────────
function analyze(text) {
  const results = [];
  for (const cat of CATEGORIES) {
    for (const pat of cat.patterns) {
      const rx = new RegExp(pat.regex.source, pat.regex.flags.replace('g','') + 'g');
      let m;
      while ((m = rx.exec(text)) !== null) {
        results.push({
          id: pat.id, catId: cat.id, catName: cat.name, catColor: cat.color,
          name: pat.name, start: m.index, end: m.index + m[0].length,
          text: m[0], sev: pat.sev, alt: pat.alt,
        });
      }
    }
  }
  // 리듬 균일성 (통계)
  const sentences = text.split(/[.。!?！？]\s*/);
  const lens = sentences.map(s=>s.trim().length).filter(l=>l>5);
  if (lens.length >= 4) {
    const mean = lens.reduce((a,b)=>a+b,0)/lens.length;
    const variance = lens.reduce((a,l)=>a+(l-mean)**2,0)/lens.length;
    if (variance < 100 && mean > 15) {
      results.push({
        id:"F01", catId:"F", catName:"리듬 균일", catColor:"#8e44ad",
        name:"문장 길이 균일 (단조로운 리듬)",
        start:0, end:text.length,
        text:`문장 ${lens.length}개 / 평균 ${mean.toFixed(0)}자 / 분산 ${variance.toFixed(0)}`,
        sev:2, alt:["짧고 긴 문장을 섞어 리듬 변화를"],
      });
    }
  }
  // 중복 제거
  results.sort((a,b)=>a.start-b.start||(b.sev-a.sev));
  const deduped=[]; let lastEnd=-1;
  for (const r of results) { if(r.start>=lastEnd){deduped.push(r);lastEnd=r.end;} }
  return deduped;
}

function calcScore(text, matches) {
  if (!text.trim()) return 0;
  const weighted = matches.reduce((s,m)=>s+m.sev,0);
  const density = weighted / Math.max(text.length,1) * 1000;
  return Math.min(100, Math.round(density * 8));
}

// ──────────────────────────────────────────────────────
//  자동 수정
// ──────────────────────────────────────────────────────
const FIXES = [
  [/(?:을|를)\s*통해(?:서)?/g, "으로"],
  [/에\s*있어서?/g, "에서"],
  [/함으로써/g, "해서"],
  [/로\s*인해/g, "때문에"],
  [/와\s*함께/g, "와"],
  [/되어\s*진다/g, "된다"], [/되어지고/g, "되고"], [/되어지며/g, "되며"],
  [/하게\s*됩니다/g, "합니다"], [/하게\s*되었습니다/g, "했습니다"],
  [/하게\s*된다/g, "한다"],
  [/살펴보도록\s*하겠습니다/g, "살펴보겠습니다"],
  [/알아보도록\s*하겠습니다/g, "알아보겠습니다"],
  [/이러한\s*맥락에서/g, "이런 점에서"],
  [/종합적으로\s*보면/g, "전반적으로"],
  [/결론적으로/g, "결국"],
  [/이에\s*따라/g, "그래서"],
  [/시사하는\s*바가\s*크다/g, "많은 것을 보여준다"],
  [/새로운\s*패러다임/g, "새로운 방향"],
  [/주목할\s*만하다/g, "눈에 띈다"],
  [/더욱더\s+/g, "더 "], [/한층\s*더\s+/g, "더 "],
];

function autoFix(text) {
  let out = text; let count = 0;
  for (const [pat, rep] of FIXES) {
    const fixed = out.replace(pat, rep);
    if (fixed !== out) count++;
    out = fixed;
  }
  return { text: out, count };
}

// ──────────────────────────────────────────────────────
//  하이라이트 렌더링
// ──────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderHighlight(text, matches) {
  if (!matches.length) return escapeHtml(text);
  let html = ""; let pos = 0;
  for (const m of matches) {
    if (m.start > pos) html += escapeHtml(text.slice(pos, m.start));
    html += `<mark class="hl cat-${m.catId}" title="${escapeHtml(m.name)}: ${escapeHtml(m.alt[0]||'')}" data-id="${m.id}">${escapeHtml(text.slice(m.start, m.end))}</mark>`;
    pos = m.end;
  }
  if (pos < text.length) html += escapeHtml(text.slice(pos));
  return html;
}

// diff 뷰 (원문 ↔ 수정본)
function renderDiff(original, fixed) {
  // 간단한 단어 레벨 diff
  const origWords = original.split(/(\s+)/);
  const fixWords  = fixed.split(/(\s+)/);
  let html = "";
  for (let i = 0; i < Math.max(origWords.length, fixWords.length); i++) {
    const o = origWords[i] ?? "";
    const f = fixWords[i] ?? "";
    if (o === f) { html += escapeHtml(o); }
    else {
      if (o) html += `<del>${escapeHtml(o)}</del>`;
      if (f) html += `<ins>${escapeHtml(f)}</ins>`;
    }
  }
  return html;
}

// ──────────────────────────────────────────────────────
//  UI
// ──────────────────────────────────────────────────────
const ta       = document.getElementById("inputText");
const overlay  = document.getElementById("highlightOverlay");
const fixedView= document.getElementById("fixedView");
const matchList= document.getElementById("matchList");
const scoreNum = document.getElementById("scoreNum");
const scoreArc = document.getElementById("scoreArc");
const scoreDesc= document.getElementById("scoreDesc");
const statTotal= document.getElementById("statTotal");
const statHigh = document.getElementById("statHigh");
const statCats = document.getElementById("statCats");
const statChars= document.getElementById("statChars");

let currentMatches = [];
let currentFixed   = "";
let activeTab      = "input";

// 탭 동기화
document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    activeTab = t.dataset.tab;
    document.getElementById("editorWrap").style.display = activeTab==="input" ? "block" : "none";
    fixedView.style.display = activeTab==="fixed" ? "block" : "none";
  });
});

// 스크롤 동기화 (overlay ↔ textarea)
ta.addEventListener("scroll", () => { overlay.scrollTop = ta.scrollTop; });

// 글자 수
ta.addEventListener("input", () => {
  document.getElementById("charCount").textContent = ta.value.length + "자";
  overlay.innerHTML = escapeHtml(ta.value);  // 분석 전엔 일반 텍스트
});

// 분석
document.getElementById("btnAnalyze").addEventListener("click", doAnalyze);
function doAnalyze() {
  const text = ta.value;
  if (!text.trim()) return;
  currentMatches = analyze(text);
  const score = calcScore(text, currentMatches);
  updateScore(score);
  updateStats(text, currentMatches);
  overlay.innerHTML = renderHighlight(text, currentMatches);
  ta.scrollTop = 0; overlay.scrollTop = 0;
  renderMatchList(currentMatches);
  buildLegend(currentMatches);
}

// 자동 수정
document.getElementById("btnFix").addEventListener("click", () => {
  const text = ta.value;
  if (!text.trim()) return;
  const {text: fixed, count} = autoFix(text);
  currentFixed = fixed;
  fixedView.innerHTML = renderDiff(text, fixed) + `\n\n<span style="color:var(--text-dim);font-size:12px">— ${count}개 규칙 적용됨</span>`;
  // 수정본 탭으로 전환
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelector('[data-tab="fixed"]').classList.add("active");
  activeTab = "fixed";
  document.getElementById("editorWrap").style.display = "none";
  fixedView.style.display = "block";
});

// 복사
document.getElementById("btnCopy").addEventListener("click", () => {
  const txt = activeTab === "fixed" ? currentFixed : ta.value;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById("btnCopy");
    btn.textContent = "✅ 복사됨"; setTimeout(()=>btn.textContent="복사",1500);
  });
});

// 지우기
document.getElementById("btnClear").addEventListener("click", () => {
  ta.value = ""; overlay.innerHTML = ""; currentMatches = [];
  matchList.innerHTML = '<div class="empty-state"><div class="icon">🔬</div>분석 전입니다</div>';
  scoreNum.textContent = "—"; scoreDesc.textContent = "텍스트를 입력하고 분석을 눌러주세요";
  ["statTotal","statHigh","statCats","statChars"].forEach(id=>document.getElementById(id).textContent="—");
  scoreArc.setAttribute("stroke-dashoffset","232.5");
  document.getElementById("charCount").textContent="0자";
});

// 샘플 텍스트
const SAMPLE = `결론적으로, 인공지능 기술의 발전을 통해 우리 사회에 있어서 다양한 변화가 이루어지고 있습니다. 이러한 맥락에서 교육 분야에 있어서 특히 주목할 만한 성과가 도출되어진다고 할 수 있습니다.

따라서 우리는 지속적인 노력이 필요하다는 사실을 간과할 수 없으며, 새로운 패러다임을 통해 미래 지향적인 방향으로 나아가야 합니다. 이에 따라 관련 stakeholder들과의 시너지 효과를 극대화함으로써 핵심 역량을 강화해야 할 것입니다.

이 문제에 대해 말씀드리자면, 여러 측면에서 심도 있는 논의가 필요하다고 여겨집니다. 종합적으로 보면 이번 연구는 시사하는 바가 크며, 향후 더욱더 활발한 연구가 기대됩니다.`;

document.getElementById("btnSample").addEventListener("click", () => {
  ta.value = SAMPLE;
  document.getElementById("charCount").textContent = SAMPLE.length + "자";
  overlay.innerHTML = escapeHtml(SAMPLE);
  doAnalyze();
});

// 점수 업데이트
function updateScore(score) {
  scoreNum.textContent = score;
  const circumference = 232.5;
  const offset = circumference * (1 - score/100);
  scoreArc.setAttribute("stroke-dashoffset", offset);
  let color, desc;
  if (score >= 70) { color="#f87171"; desc="🔴 AI 티가 강하게 느껴집니다"; }
  else if (score >= 40) { color="#fb923c"; desc="🟠 일부 AI 특유 표현이 있습니다"; }
  else if (score >= 20) { color="#fcd34d"; desc="🟡 자연스럽지만 개선 가능합니다"; }
  else { color="#4ade80"; desc="🟢 자연스러운 한국어에 가깝습니다"; }
  scoreArc.setAttribute("stroke", color);
  scoreNum.style.color = color;
  scoreDesc.textContent = desc; scoreDesc.style.color = color;
}

function updateStats(text, matches) {
  statTotal.textContent = matches.length;
  statHigh.textContent = matches.filter(m=>m.sev===3).length;
  statCats.textContent = new Set(matches.map(m=>m.catId)).size;
  statChars.textContent = text.length + "자";
}

function renderMatchList(matches) {
  if (!matches.length) {
    matchList.innerHTML = '<div class="empty-state"><div class="icon">✅</div>AI 특유 패턴이 없습니다!</div>';
    return;
  }
  const grouped = {};
  for (const m of matches) {
    if (!grouped[m.catId]) grouped[m.catId] = { name: m.catName, color: m.catColor, items: [] };
    grouped[m.catId].items.push(m);
  }
  let html = "";
  for (const [cid, g] of Object.entries(grouped)) {
    html += `<div style="font-size:11px;color:var(--text-dim);margin:10px 0 4px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">${g.name}</div>`;
    for (const m of g.items) {
      html += `<div class="match-item sev-${m.sev}" style="border-left-color:${m.catColor}">
        <div class="m-head">
          <span class="m-badge badge-${m.sev}">${["","낮음","중간","높음"][m.sev]}</span>
          <span class="m-name">${escapeHtml(m.name)}</span>
        </div>
        <div class="m-text">"${escapeHtml(m.text.slice(0,40))}${m.text.length>40?'…':''}"</div>
        ${m.alt.length ? `<div class="m-alt">→ ${escapeHtml(m.alt.slice(0,2).join(' / '))}</div>` : ""}
      </div>`;
    }
  }
  matchList.innerHTML = html;
}

function buildLegend(matches) {
  const used = [...new Set(matches.map(m=>m.catId))];
  const catMap = {};
  for (const cat of CATEGORIES) catMap[cat.id] = cat;
  const legend = document.getElementById("legend");
  if (!used.length) { legend.innerHTML=""; return; }
  legend.innerHTML = used.map(id => `<div class="legend-item"><div class="legend-dot" style="background:${catMap[id]?.color}"></div>${catMap[id]?.name||id}</div>`).join("");
}

// 키보드 단축키
document.addEventListener("keydown", e => {
  if ((e.ctrlKey||e.metaKey) && e.key==="Enter") { e.preventDefault(); doAnalyze(); }
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==="F") { e.preventDefault(); document.getElementById("btnFix").click(); }
});
</script>
